<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            background-image: url ('https://raw.githubusercontent.com/drukyul1962-coder/Invitation/main/Background.png')
        }

        .container {
            width: 90%; /* Keeps a small gap at the edges on mobile */
            max-width: 600px; /* Prevents it from getting too huge on desktop */
        }

        img {
            width: 100%;    /* Scales to the width of the container */
            height: auto;   /* Maintains the original proportions */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/drukyul1962-coder/Invitation/main/Invitation.png" alt="Invitation">
    </div>

</body>
</html>
