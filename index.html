<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* --- Background Optimization --- */
            background-image: url('https://raw.githubusercontent.com/drukyul1962-coder/Invitation/main/background.png');
            background-size: cover;      /* Fills the whole screen without gaps */
            background-position: center; /* Keeps the focus in the middle */
            background-repeat: no-repeat;/* Prevents the image from tiling */
            background-attachment: fixed;/* Keeps background still while scrolling */
        }

        .container {
            width: 85%; /* Slightly smaller for a cleaner "card" look */
            max-width: 500px; 
            padding: 10px; /* Air around the image */
        }

        img {
            display: block; /* Removes tiny bottom gap in some browsers */
            width: 100%;    
            height: auto;   
            border-radius: 12px; /* Softer corners for invitations */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); /* Deeper shadow for depth */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/drukyul1962-coder/Invitation/main/kavi.jpeg" alt="Invitation">
    </div>

</body>
</html>
